<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// KLEIN_FINANCE.SYS</title>

<style>
:root{
  --bg:#0a0d0a;
  --bg2:#12171a;
  --panel:#1a1f22;
  --panel2:#22282c;
  --line:#2a3138;
  --neon:#c5f82a;
  --neon2:#9be005;
  --neon-dim:#6b8c0e;
  --text:#e8eae8;
  --text-dim:#8a928c;
  --text-faint:#5a625c;
  --red:#ff3b3b;
  --amber:#ffb020;
  --cyan:#2af8e8;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}

/* Grid/circuit background */
body::before{
content:””;position:fixed;inset:0;pointer-events:none;z-index:0;
background-image:
linear-gradient(rgba(197,248,42,.025) 1px,transparent 1px),
linear-gradient(90deg,rgba(197,248,42,.025) 1px,transparent 1px);
background-size:32px 32px;
}
body::after{
content:””;position:fixed;inset:0;pointer-events:none;z-index:0;
background:radial-gradient(ellipse at 20% 0%,rgba(197,248,42,.08),transparent 50%),
radial-gradient(ellipse at 80% 100%,rgba(42,248,232,.04),transparent 50%);
}

#root{position:relative;z-index:1;padding:10px;max-width:760px;margin:0 auto}

button{cursor:pointer;font-family:inherit;transition:all .15s ease}

/* Scroll */
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:var(–panel)}
::-webkit-scrollbar-thumb{background:var(–neon);border-radius:0}

/* Inputs — tech style */
input[type=number]{
background:var(–bg2);
border:1px solid var(–line);
border-left:3px solid var(–neon);
color:var(–text);
padding:10px 12px;
font-size:15px;
font-weight:600;
width:100%;
font-family:‘JetBrains Mono’,monospace;
transition:all .2s;
-moz-appearance:textfield;
clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]:focus{
outline:none;
border-color:var(–neon);
border-left-color:var(–neon);
background:#181e18;
box-shadow:0 0 0 1px var(–neon),0 0 20px rgba(197,248,42,.2);
}

.inp-label{
font-family:‘Orbitron’,sans-serif;
font-size:9px;
color:var(–neon);
text-transform:uppercase;
letter-spacing:2px;
font-weight:700;
margin-bottom:6px;
display:flex;align-items:center;gap:6px;
}
.inp-label::before{
content:””;width:6px;height:6px;background:var(–neon);
clip-path:polygon(0 0,100% 0,50% 100%);
}
.inp-hint{
font-family:‘JetBrains Mono’,monospace;
font-size:9px;color:var(–text-faint);margin-top:4px;
padding-left:8px;border-left:1px solid var(–line);
}
.inp-group{margin-bottom:14px}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:420px){.inp-row{grid-template-columns:1fr}}

/* Live dot */
.live-dot{
width:8px;height:8px;background:var(–neon);display:inline-block;
box-shadow:0 0 10px var(–neon);
animation:pulse 1.2s infinite;
clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}

@keyframes glitch-in{
0%{opacity:0;transform:translateY(6px) skewX(-2deg);clip-path:inset(0 100% 0 0)}
50%{clip-path:inset(0 0 0 0)}
100%{opacity:1;transform:translateY(0) skewX(0);clip-path:inset(0 0 0 0)}
}
.fade-up{animation:glitch-in .4s ease-out}

/* Panels — chanfered / tech frames */
.panel{
background:var(–panel);
border:1px solid var(–line);
padding:16px;
margin-bottom:12px;
position:relative;
clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px);
}
.panel::before{
content:””;position:absolute;top:8px;left:8px;width:10px;height:10px;
border-top:1.5px solid var(–neon);border-left:1.5px solid var(–neon);
}
.panel::after{
content:””;position:absolute;bottom:8px;right:8px;width:10px;height:10px;
border-bottom:1.5px solid var(–neon);border-right:1.5px solid var(–neon);
}
.panel-neon{
background:linear-gradient(135deg,#1a2008,#2d3a0a);
border:1px solid var(–neon);
color:var(–text);
}
.panel-red{
background:linear-gradient(135deg,#2a0808,#3a0f0f);
border:1px solid var(–red);
}
.panel-cyan{
background:linear-gradient(135deg,#072020,#0a2d2d);
border:1px solid var(–cyan);
}

/* Headers */
.h-title{
font-family:‘Orbitron’,sans-serif;
font-weight:900;
letter-spacing:1px;
text-transform:uppercase;
}

/* Tech corner markers */
.corner-marker{
position:relative;padding-left:14px;
}
.corner-marker::before{
content:””;position:absolute;left:0;top:50%;transform:translateY(-50%);
width:8px;height:8px;background:var(–neon);
clip-path:polygon(0 0,100% 50%,0 100%);
}

/* Hex/angled button */
.tech-btn{
padding:8px 14px;
background:var(–panel);
border:1px solid var(–line);
color:var(–text-dim);
font-family:‘Orbitron’,sans-serif;
font-size:9px;
font-weight:700;
letter-spacing:1.5px;
text-transform:uppercase;
white-space:nowrap;
clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
position:relative;
}
.tech-btn:hover{color:var(–neon);border-color:var(–neon-dim)}
.tech-btn.active{
background:var(–neon);
color:var(–bg);
border-color:var(–neon);
box-shadow:0 0 20px rgba(197,248,42,.4);
}

/* Chain decor */
.chain-decor{
position:absolute;
right:-10px;top:-10px;
width:50px;height:50px;
opacity:.15;
pointer-events:none;
}

/* Section label — like “ON/OFF” from poster */
.onoff-label{
display:inline-flex;align-items:center;gap:8px;
padding:4px 10px;
background:var(–bg2);
border:1px solid var(–line);
font-family:‘Orbitron’,sans-serif;
font-size:9px;
font-weight:700;
letter-spacing:2px;
color:var(–text-dim);
clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
}
.onoff-label .dot{
width:6px;height:6px;border-radius:50%;background:var(–neon);
box-shadow:0 0 8px var(–neon);
}

.mono{font-family:‘JetBrains Mono’,monospace}
.disp{font-family:‘Orbitron’,sans-serif;font-weight:900;letter-spacing:2px}

/* Progress bar */
.progress{
height:6px;background:var(–bg2);border:1px solid var(–line);position:relative;overflow:hidden;
}
.progress-fill{
height:100%;
background:linear-gradient(90deg,var(–neon) 0%,var(–amber) 60%,var(–red) 100%);
box-shadow:0 0 10px var(–neon);
}

.kv-card{
padding:10px 12px;
background:var(–bg2);
border:1px solid var(–line);
border-left:3px solid var(–neon);
position:relative;
}
.kv-card::after{
content:””;position:absolute;top:0;right:0;border-top:8px solid var(–line);border-left:8px solid transparent;
}

/* Tab scroll */
.tab-scroll{
display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding:4px 0 8px;
scrollbar-width:thin;
}

/* Headline treatment */
.hero-title{
font-family:‘Orbitron’,sans-serif;
font-weight:900;
font-size:38px;
line-height:.9;
letter-spacing:2px;
color:var(–text);
text-transform:uppercase;
position:relative;
display:inline-block;
}
.hero-title .accent{color:var(–neon);text-shadow:0 0 20px rgba(197,248,42,.5)}
.hero-sub{
display:inline-block;
background:var(–neon);
color:var(–bg);
padding:4px 12px;
font-family:‘Orbitron’,sans-serif;
font-size:10px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
margin-top:8px;
clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);
}

/* Frame with bracket corners */
.frame-brackets{position:relative;padding:14px}
.frame-brackets::before,.frame-brackets::after,
.frame-brackets > .br-tl,.frame-brackets > .br-br{
content:””;position:absolute;width:14px;height:14px;border:2px solid var(–neon);
}
.frame-brackets::before{top:0;left:0;border-right:none;border-bottom:none}
.frame-brackets::after{bottom:0;right:0;border-left:none;border-top:none}
.frame-brackets > .br-tr{position:absolute;top:0;right:0;width:14px;height:14px;border:2px solid var(–neon);border-left:none;border-bottom:none}
.frame-brackets > .br-bl{position:absolute;bottom:0;left:0;width:14px;height:14px;border:2px solid var(–neon);border-right:none;border-top:none}

.divider-tech{
display:flex;align-items:center;gap:10px;margin:18px 0 12px;
}
.divider-tech .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(–line),transparent)}
.divider-tech .txt{font-family:‘Orbitron’,sans-serif;font-size:9px;letter-spacing:3px;color:var(–text-dim);text-transform:uppercase}
.divider-tech .dot{width:6px;height:6px;background:var(–neon);clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}

/* Row items */
.row-item{
padding:10px 12px;
background:var(–bg2);
border:1px solid var(–line);
margin-bottom:6px;
position:relative;
transition:all .2s;
}
.row-item:hover{border-color:var(–neon-dim);background:#1d2320}
.row-item.active{border-color:var(–neon);box-shadow:inset 3px 0 0 var(–neon)}

/* Badge */
.badge{
display:inline-block;padding:2px 8px;
font-family:‘Orbitron’,sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;
text-transform:uppercase;
clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);
}
.badge-neon{background:var(–neon);color:var(–bg)}
.badge-red{background:var(–red);color:#fff}
.badge-cyan{background:var(–cyan);color:var(–bg)}

</style>
</head>

const S1=[1296.34,1279.43,1262.18,1245.72,1228.93,1212.36,1196.55,1180.42,1165.02,1149.32,1133.83,1120.01,1104.92,1090.50,1075.80,1061.77,1047.46,1033.34,1019.86,1006.11,992.99,979.60,966.40,954.21,941.35,929.07,916.55,904.59,892.40,880.37,868.88,857.17,845.99,834.59,823.34,813.31,802.34,791.88,781.20,771.01,760.62,750.37,740.58,730.60,721.07,711.35,701.76,693.21,683.87,674.94,665.85,657.16,648.30,639.57,631.22,622.71,614.59,606.31,598.13,590.85,582.88,575.28,567.53,560.12,552.57,545.12,538.01,530.76,523.84,516.78,509.81,503.38,496.60,490.12,483.51,477.20,470.77,464.43];
const S2=[72.59,71.37,70.12,68.94,67.74,66.56,65.43,64.29,63.21,62.11,61.02,60.06,59.01,58.02,57.01,56.04,55.07,54.11,53.19,52.27,51.39,50.49,49.61,48.80,47.95,47.14,46.32,45.54,44.74,43.96,43.22,42.47,41.75,41.02,40.31,39.67,38.98,38.32,37.66,37.02,36.37,35.74,35.14,34.52,33.94,33.35,32.77,32.25,31.69,31.16,30.61,30.10,29.57,29.06,28.57,28.07,27.59,27.11,26.64,26.22,25.76,25.33,24.89,24.47,24.04,23.62,23.22,22.82,22.43,22.04,21.66,21.30,20.93,20.58,20.22,19.88,19.53,19.19];
const S3=[63.53,62.48,61.41,60.39,59.35,58.33,57.37,56.38,55.45,54.50,53.56,52.73,51.83,50.97,50.09,49.26,48.42,47.59,46.80,46.00,45.23,44.46,43.70,42.99,42.26,41.56,40.84,40.17,39.48,38.80,38.16,37.50,36.88,36.25,35.63,35.07,34.47,33.90,33.32,32.77,32.20,31.65,31.13,30.59,30.09,29.57,29.06,28.61,28.12,27.66,27.18,26.73,26.27,25.82,25.39,24.96,24.54,24.12,23.71,23.34,22.94,22.56,22.17,21.81,21.43,21.06,20.72,20.36,20.02,19.68,19.34,19.03,18.70,18.39,18.08,17.78,17.47,17.17,16.89];
const JP=[629.60,618.25,607.45,596.50,585.74,575.52,565.14,555.28,545.27,535.43,526.70,517.21,508.18,499.02,490.31,481.46,472.78,464.53,456.15,448.19,440.11,432.17,424.88,417.22,409.93,402.54,395.52,388.38,381.38,374.72,367.97,361.54,355.02,348.62,342.94,336.76,330.88,324.91,319.24,313.48,307.83,302.46,297.00,291.82,286.56,281.39];

const LOANS_DEF=[
  {id:"sant1",name:"SANT.CONSIG.01",owner:"ERWIN",inst:"Santander",rate:1.3219,bal:63288.88,startK:mk(2026,4),sched:S1,color:"#ff3b3b"},
  {id:"sant2",name:"SANT.CONSIG.02",owner:"ERWIN",inst:"Santander",rate:1.7165,bal:3136.90,startK:mk(2026,4),sched:S2,color:"#ff6b6b"},
  {id:"sant3",name:"SANT.CONSIG.03",owner:"ERWIN",inst:"Santander",rate:1.6876,bal:2786.22,startK:mk(2026,4),sched:S3,color:"#ff9b9b"},
  {id:"jeep",name:"SANT.JEEP",owner:"ERWIN",inst:"Santander",rate:1.77,bal:19913.98,startK:mk(2026,4),sched:JP,color:"#e74c3c"},
  {id:"bb1",name:"BB.CONSIG.EK1",owner:"ERWIN",inst:"BB",rate:2.68,bal:22277.66,startK:mk(2026,4),sched:Array(48).fill(852.61),color:"#ffb020"},
  {id:"bb2",name:"BB.CONSIG.EK2",owner:"ERWIN",inst:"BB",rate:2.73,bal:4119.88,startK:mk(2026,4),sched:Array(48).fill(159.26),color:"#ff9500"},
  {id:"bb3",name:"BB.CONSIG.EK3",owner:"ERWIN",inst:"BB",rate:3.27,bal:2060.40,startK:mk(2026,4),sched:Array(48).fill(90.47),color:"#ff7700"},
  {id:"bbrk",name:"BB.CONSIG.RK",owner:"RAQUEL",inst:"BB",rate:3.22,bal:20950,startK:mk(2026,6),sched:Array(37).fill(977.39),color:"#c5f82a"},
  {id:"barra",name:"BARRACRED.RK",owner:"RAQUEL",inst:"Barracred",rate:0.5,bal:11808.78,startK:mk(2026,4),sched:Array(16).fill(707.53),color:"#2af8e8"},
];

const FIXED_EXP_DEF=[
  {id:"aluguel",name:"ALUGUEL + COND.",val:2160,growthRate:5,isLoan:false},
  {id:"luz",name:"LUZ",val:320,growthRate:4,isLoan:false},
  {id:"gas",name:"GÁS",val:30,growthRate:3,isLoan:false},
  {id:"colegio",name:"COLÉGIO OBJETIVO",val:1934.50,growthRate:10,isLoan:false},
  {id:"mercado",name:"MERCADO/COMIDA",val:1886,growthRate:5,isLoan:false},
  {id:"cartoes",name:"CARTÕES",val:450,growthRate:3,isLoan:false},
  {id:"jeep_parc",name:"PARCELA JEEP",val:643.80,growthRate:0,isLoan:true},
  {id:"combustivel",name:"COMBUSTÍVEL",val:400,growthRate:4,isLoan:false},
  {id:"vivo",name:"VIVO",val:270,growthRate:3,isLoan:false},
  {id:"outros",name:"OUTROS",val:0,growthRate:3,isLoan:false},
];

function calcExpense(exp,mo){return exp.val*Math.pow(1+exp.growthRate/100,mo/12);}
function calcTotalFixedAtMonth(exps,mo){return exps.reduce((s,e)=>s+calcExpense(e,mo),0);}
function calcFixedNoLoanAtMonth(exps,mo){return exps.filter(e=>!e.isLoan).reduce((s,e)=>s+calcExpense(e,mo),0);}

function calcINSS(g){let t=0,p=0;for(const[l,r]of[[1412,.075],[2666.68,.09],[4000.03,.12],[7786.02,.14]]){if(g<=p)break;t+=(Math.min(g,l)-p)*r;p=l;}return t;}
function calcIRRF(g,i){const b=g-i;for(const[l,r,d]of[[2259.20,0,0],[2826.65,.075,169.44],[3751.05,.15,381.44],[4664.68,.225,662.77],[1e9,.275,896]]){if(b<=l)return Math.max(0,b*r-d);}return 0;}
function netS(g){const i=calcINSS(g);return g-i-calcIRRF(g,i);}
function netPPR(g){for(const[l,r,d]of[[7640.80,0,0],[9922.28,.075,573.06],[13167,.15,1316.28],[16380.38,.225,2303.55],[1e9,.275,3122.06]]){if(g<=l)return g-Math.max(0,g*r-d);}return g;}
function gSal(base,target,i,months){return base+(target-base)*Math.min(i,months)/months;}

function runSim(params){
  const{raquelBruto,erwinBruto,vaRaquel,vaErwin,pprMultiplier,raquelTarget,erwinTarget,growthMonths,fiiRate,livingMin,fixedExps}=params;
  const START=mk(2026,4);const END_K=mk(2060,11);
  let pool=14440.24;
  let loans=LOANS_DEF.map(l=>({...l,balance:l.bal,paidOff:false,paidOffMonth:null,totalPaid:0,totalInterest:0}));
  const months=[];let debtFreeK=null,portfolio=0;
  for(let i=0;;i++){
    const k=START+i;if(k>END_K)break;
    const[y,m]=fk(k);
    const rG=gSal(raquelBruto,raquelTarget,i,growthMonths);
    const eG=gSal(erwinBruto,erwinTarget,i,growthMonths);
    const vaR_cur=gSal(vaRaquel,vaRaquel*(raquelTarget/Math.max(raquelBruto,1)),i,growthMonths);
    const vaE_cur=gSal(vaErwin,vaErwin*(erwinTarget/Math.max(erwinBruto,1)),i,growthMonths);
    const income=netS(rG)+netS(eG)+vaR_cur+vaE_cur;
    const fixedNoLoan=calcFixedNoLoanAtMonth(fixedExps,i);
    const totalDebtBefore=loans.reduce((s,l)=>s+l.balance,0);
    const isDebtFree=totalDebtBefore<=0.5;
    if(!isDebtFree){
      const surp=Math.max(0,income-fixedNoLoan-livingMin);
      const liv=Math.min(income-fixedNoLoan,livingMin);
      pool+=surp;
      let lumpSum=0,lumpLbl="";
      if(m===11){const b=netS(rG)+netS(eG);lumpSum+=b;lumpLbl=`13° (${R$(b)})`;}
      if(m===3&&y>=2027){const p=netPPR(rG*pprMultiplier);lumpSum+=p;lumpLbl+=(lumpLbl?" + ":"")+`PPR (${R$(p)})`;}
      pool+=lumpSum;
      let totalPmt=0;const loanDet=[];
      for(const loan of loans){
        if(loan.paidOff||loan.balance<=0.5){if(!loan.paidOff&&loan.balance<=0.5){loan.paidOff=true;loan.paidOffMonth=loan.paidOffMonth||k;loan.balance=0;}loanDet.push({id:loan.id,name:loan.name,pmt:0,bal:0,color:loan.color});continue;}
        const si=k-loan.startK;if(si<0){loanDet.push({id:loan.id,name:loan.name,pmt:0,bal:loan.balance,color:loan.color});continue;}
        const interest=loan.balance*loan.rate/100;let sp=si<loan.sched.length?loan.sched[si]:0;
        if(sp<=0&&loan.balance>0.5)sp=Math.min(loan.balance+interest,loan.sched[0]||500);
        sp=Math.min(sp,loan.balance+interest);const princ=Math.max(0,sp-interest);
        loan.balance=Math.max(0,loan.balance-princ);loan.totalPaid+=sp;loan.totalInterest+=interest;
        totalPmt+=sp;
        if(loan.balance<=0.5){loan.paidOff=true;loan.paidOffMonth=k;loan.balance=0;}
        loanDet.push({id:loan.id,name:loan.name,pmt:sp,bal:loan.balance,color:loan.color});
      }
      pool-=totalPmt;
      let lumpAmort=0;const amortDet=[];
      if(lumpSum>0){const mN=m===11?4:8;const est=totalPmt>0?totalPmt:3500;const exc=Math.max(0,pool-est*mN);let rem=exc;
