function calcExpense(exp,mo){return exp.val*Math.pow(1+exp.growthRate/100,mo/12);}
function calcTotalFixedAtMonth(exps,mo){return exps.reduce((s,e)=>s+calcExpense(e,mo),0);}
function calcFixedNoLoanAtMonth(exps,mo){return exps.filter(e=>!e.isLoan).reduce((s,e)=>s+calcExpense(e,mo),0);}

function calcINSS(g){let t=0,p=0;for(const[l,r]of[[1412,.075],[2666.68,.09],[4000.03,.12],[7786.02,.14]]){if(g<=p)break;t+=(Math.min(g,l)-p)*r;p=l;}return t;}
function calcIRRF(g,i){const b=g-i;for(const[l,r,d]of[[2259.20,0,0],[2826.65,.075,169.44],[3751.05,.15,381.44],[4664.68,.225,662.77],[1e9,.275,896]]){if(b<=l)return Math.max(0,b*r-d);}return 0;}
function netS(g){const i=calcINSS(g);return g-i-calcIRRF(g,i);}
function netPPR(g){for(const[l,r,d]of[[7640.80,0,0],[9922.28,.075,573.06],[13167,.15,1316.28],[16380.38,.225,2303.55],[1e9,.275,3122.06]]){if(g<=l)return g-Math.max(0,g*r-d);}return g;}
function gSal(base,target,i,months){return base+(target-base)*Math.min(i,months)/months;}

function runSim(params){
  const{raquelBruto,erwinBruto,vaRaquel,vaErwin,pprMultiplier,raquelTarget,erwinTarget,growthMonths,fiiRate,livingMin,fixedExps}=params;
  const START=mk(2026,4);const END_K=mk(2060,11);
  let pool=14440.24;
  let loans=LOANS_DEF.map(l=>({...l,balance:l.bal,paidOff:false,paidOffMonth:null,totalPaid:0,totalInterest:0}));
  const months=[];let debtFreeK=null,portfolio=0;
  for(let i=0;;i++){
    const k=START+i;if(k>END_K)break;
    const[y,m]=fk(k);
    const rG=gSal(raquelBruto,raquelTarget,i,growthMonths);
    const eG=gSal(erwinBruto,erwinTarget,i,growthMonths);
    const vaR_cur=gSal(vaRaquel,vaRaquel*(raquelTarget/Math.max(raquelBruto,1)),i,growthMonths);
    const vaE_cur=gSal(vaErwin,vaErwin*(erwinTarget/Math.max(erwinBruto,1)),i,growthMonths);
    const income=netS(rG)+netS(eG)+vaR_cur+vaE_cur;
    const fixedNoLoan=calcFixedNoLoanAtMonth(fixedExps,i);
    const totalDebtBefore=loans.reduce((s,l)=>s+l.balance,0);
    const isDebtFree=totalDebtBefore<=0.5;
    if(!isDebtFree){
      const surp=Math.max(0,income-fixedNoLoan-livingMin);
      const liv=Math.min(income-fixedNoLoan,livingMin);
      pool+=surp;
      let lumpSum=0,lumpLbl="";
      if(m===11){const b=netS(rG)+netS(eG);lumpSum+=b;lumpLbl=`13° (${R$(b)})`;}
      if(m===3&&y>=2027){const p=netPPR(rG*pprMultiplier);lumpSum+=p;lumpLbl+=(lumpLbl?" + ":"")+`PPR (${R$(p)})`;}
      pool+=lumpSum;
      let totalPmt=0;const loanDet=[];
      for(const loan of loans){
        if(loan.paidOff||loan.balance<=0.5){if(!loan.paidOff&&loan.balance<=0.5){loan.paidOff=true;loan.paidOffMonth=loan.paidOffMonth||k;loan.balance=0;}loanDet.push({id:loan.id,name:loan.name,pmt:0,bal:0,color:loan.color});continue;}
        const si=k-loan.startK;if(si<0){loanDet.push({id:loan.id,name:loan.name,pmt:0,bal:loan.balance,color:loan.color});continue;}
        const interest=loan.balance*loan.rate/100;let sp=si<loan.sched.length?loan.sched[si]:0;
        if(sp<=0&&loan.balance>0.5)sp=Math.min(loan.balance+interest,loan.sched[0]||500);
        sp=Math.min(sp,loan.balance+interest);const princ=Math.max(0,sp-interest);
        loan.balance=Math.max(0,loan.balance-princ);loan.totalPaid+=sp;loan.totalInterest+=interest;
        totalPmt+=sp;
        if(loan.balance<=0.5){loan.paidOff=true;loan.paidOffMonth=k;loan.balance=0;}
        loanDet.push({id:loan.id,name:loan.name,pmt:sp,bal:loan.balance,color:loan.color});
      }
      pool-=totalPmt;
      let lumpAmort=0;const amortDet=[];
      if(lumpSum>0){const mN=m===11?4:8;const est=totalPmt>0?totalPmt:3500;const exc=Math.max(0,pool-est*mN);let rem=exc;
        for(const loan of loans.filter(l=>!l.paidOff&&l.balance>0.5).sort((a,b)=>b.rate-a.rate)){if(rem<=0)break;const ap=Math.min(rem,loan.balance);if(ap>0){loan.balance-=ap;rem-=ap;lumpAmort+=ap;pool-=ap;amortDet.push({id:loan.id,name:loan.name,amount:ap,color:loan.color});if(loan.balance<=0.5){loan.paidOff=true;loan.paidOffMonth=k;loan.balance=0;}}}}
      const totalDebt=loans.reduce((s,l)=>s+l.balance,0);
      if(totalDebt<=0.5&&!debtFreeK){debtFreeK=k;portfolio=pool;pool=0;}
      months.push({k,y,m,label:fm(y,m),phase:"debt",income,rG,eG,fixedNoLoan,totalPmt,pool,liv,surp,lumpSum,lumpLbl,lumpAmort,loanDet,amortDet,totalDebt,active:loans.filter(l=>!l.paidOff).length,portfolio:0,yield_:0,contribution:0,halfLiving:0,halfInvest:0,spendPower:liv,vaR:vaR_cur,vaE:vaE_cur});
    }else{
      if(!debtFreeK){debtFreeK=k;portfolio=pool;pool=0;}
      const surplus=income-fixedNoLoan;const hL=Math.max(livingMin,Math.floor(surplus/2));const hI=surplus-hL;
      let lI=0,lLbl="";
      if(m===11){const b=netS(rG)+netS(eG);lI+=b;lLbl=`13° (${R$(b)})`;}
      if(m===3&&y>=2027){const p=netPPR(rG*pprMultiplier);lI+=p;lLbl+=(lLbl?" + ":"")+`PPR (${R$(p)})`;}
      const yld=portfolio*fiiRate;portfolio+=yld+hI+lI;
      months.push({k,y,m,label:fm(y,m),phase:"invest",income,rG,eG,fixedNoLoan,totalPmt:0,pool:0,liv:hL,surp:hI,lumpSum:lI,lumpLbl:lLbl,lumpAmort:0,loanDet:[],amortDet:[],totalDebt:0,active:0,portfolio,yield_:yld,contribution:hI+lI,halfLiving:hL,halfInvest:hI,spendPower:surplus+yld,vaR:vaR_cur,vaE:vaE_cur});
    }
  }
  const milestones=loans.map(l=>({...l,paidOffLabel:l.paidOffMonth?fm(...fk(l.paidOffMonth)):"—"})).sort((a,b)=>(a.paidOffMonth||9e9)-(b.paidOffMonth||9e9));
  return{months,milestones,debtFreeK};
}

function Inp({label,value,onChange,hint,accent,prefix,step,small}){
  const[local,setLocal]=useState(String(value));
  const timer=useRef(null);
  useEffect(()=>{setLocal(String(value));},[value]);
  const handle=e=>{
    const v=e.target.value;setLocal(v);
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>{const n=parseFloat(v);if(!isNaN(n))onChange(n);},2000);
  };
  return React.createElement('div',{className:'inp-group',style:small?{marginBottom:6}:{}},
    label&&React.createElement('div',{className:'inp-label'},label),
    React.createElement('div',{style:{position:'relative'}},
      prefix&&React.createElement('span',{style:{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#5a7ab0',fontSize:11,fontWeight:700,pointerEvents:'none'}},prefix),
      React.createElement('input',{type:'number',value:local,onChange:handle,className:accent?'accent-'+accent:'',style:{paddingLeft:prefix?34:12,paddingRight:12,paddingTop:small?7:10,paddingBottom:small?7:10,fontSize:small?13:16},step:step||'any'})
    ),
    hint&&React.createElement('div',{className:'inp-hint'},hint)
  );
}

  const[raquelBruto,setRaquelBruto]=useState(10500);

  const[vaErwin,setVaErwin]=useState(730);
  const[pprMultiplier,setPprMultiplier]=useState(4.5);

  const[fiiRate,setFiiRate]=useState(0.88);

  const[fixedExps,setFixedExps]=useState(FIXED_EXP_DEF);
  const[tab,setTab]=useState("inputs");
  const[yr,setYr]=useState(2026);

  const params=useMemo(()=>({raquelBruto,erwinBruto,vaRaquel,vaErwin,pprMultiplier,raquelTarget,erwinTarget,growthMonths,fiiRate:fiiRate/100,livingMin,fixedExps}),[raquelBruto,erwinBruto,vaRaquel,vaErwin,pprMultiplier,raquelTarget,erwinTarget,fiiRate,livingMin,fixedExps]);
  const sim=useMemo(()=>runSim(params),[params]);

  const M1=sim.months[0]||{};
  const debtFreeLabel=sim.debtFreeK?fm(...fk(sim.debtFreeK)):"—";
  const yrs=[...new Set(sim.months.map(r=>r.y))];
  const origDebt=LOANS_DEF.reduce((s,l)=>s+l.bal,0);
  const investMonths=sim.months.filter(m=>m.phase==="invest");
  const inv2034=investMonths.filter(m=>m.y<=2034).pop();
  const inv2060=investMonths[investMonths.length-1];
  const debtMonths=sim.months.filter(m=>m.phase==="debt");
  const totalIntPaid=sim.milestones.reduce((s,l)=>s+l.totalInterest,0);
  const incomeNow=netS(raquelBruto)+netS(erwinBruto)+vaRaquel+vaErwin;
  const fixedNow=calcFixedNoLoanAtMonth(fixedExps,0);
  const surplusNow=Math.max(0,incomeNow-fixedNow-livingMin);

  const tabs=[
    {id:"inputs",i:"⚙️",l:"Inputs"},
