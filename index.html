<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KLEIN FINANCE // MAI.2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#dbe8e5;
      --bg2:#eff7f5;
      --panel:#004d4b;
      --panel2:#006460;
      --panel3:#003b3a;
      --card:#f3fbf9;
      --card2:#dbe9e7;
      --text:#073f3d;
      --text-dim:#416f6d;
      --text-soft:#779796;
      --white:#f8fffd;
      --teal:#005755;
      --cyan:#00bbb2;
      --green:#3fbf9f;
      --amber:#f1b65f;
      --red:#e76464;
      --line:rgba(0,77,75,.16);
      --shadow:0 22px 36px rgba(0,50,50,.22), inset 0 1px 0 rgba(255,255,255,.08);
      --soft-shadow:10px 16px 28px rgba(0,59,58,.18), -8px -8px 22px rgba(255,255,255,.65);
      --radius:30px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;overflow-x:hidden}
    body{
      background:
        radial-gradient(circle at 10% 0%, rgba(255,255,255,.72), transparent 31%),
        radial-gradient(circle at 90% 10%, rgba(0,91,88,.14), transparent 30%),
        linear-gradient(135deg,var(--bg),#eef7f5 45%,#cadad8);
      color:var(--text);
      font-family:'Rajdhani',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      padding:28px 16px 36px;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(0,77,75,.035) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,77,75,.035) 1px,transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.7),transparent 85%);
      z-index:0;
    }

    #root{position:relative;z-index:1;max-width:1120px;margin:0 auto}
    button,input{font-family:inherit}
    button{cursor:pointer;border:0;transition:.2s ease}
    ::selection{background:var(--teal);color:#fff}
    ::-webkit-scrollbar{height:7px;width:7px}
    ::-webkit-scrollbar-track{background:rgba(0,77,75,.08);border-radius:999px}
    ::-webkit-scrollbar-thumb{background:var(--teal);border-radius:999px}

    .mono{font-family:'JetBrains Mono',monospace}
    .disp{font-family:'Orbitron',sans-serif;font-weight:800;letter-spacing:1.6px;text-transform:uppercase}
    .muted{color:var(--text-soft)}

    .app-shell{display:grid;gap:18px}

    .topbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:18px;
      align-items:center;
      margin-bottom:18px;
    }
    .nav-pill,.profile-pill{
      background:var(--panel);
      color:var(--white);
      border-radius:999px;
      box-shadow:var(--soft-shadow);
      min-height:50px;
    }
    .nav-pill{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:0 26px;
      overflow-x:auto;
    }
    .nav-pill span,.profile-pill span{white-space:nowrap}
    .nav-pill .active{
      color:#eafffb;
      text-decoration:underline;
      text-underline-offset:4px;
      font-weight:900;
    }
    .profile-pill{
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 22px;
      min-width:190px;
    }
    .profile-icon{
      width:24px;
      height:24px;
      border-radius:50%;
      background:var(--card);
      color:var(--teal);
      display:grid;
      place-items:center;
      font-weight:900;
    }
    .profile-text{line-height:.9;font-weight:800}
    .profile-text small{
      display:block;
      color:#b9d5d1;
      font-family:'JetBrains Mono';
      font-size:9px;
      margin-top:4px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:22px;
      margin-bottom:18px;
      align-items:stretch;
    }
    .hero{
      position:relative;
      overflow:hidden;
      min-height:350px;
      background:linear-gradient(145deg,var(--panel),var(--panel3));
      border-radius:36px;
      padding:28px;
      box-shadow:var(--shadow);
      color:var(--white);
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:16px;
      border:2px solid rgba(242,250,248,.58);
      border-radius:22px;
      pointer-events:none;
    }
    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-60px;
      width:240px;
      height:240px;
      border-radius:50%;
      background:rgba(142,230,214,.16);
      filter:blur(3px);
    }
    .search-pill{
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:space-between;
      background:rgba(0,0,0,.13);
      border-radius:18px;
      padding:13px 18px;
      margin-bottom:22px;
      color:#cce5e1;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
      position:relative;
      z-index:2;
    }
    .hero-kicker{
      position:relative;
      z-index:1;
      display:inline-block;
      border:2px solid rgba(242,250,248,.55);
      border-radius:14px;
      padding:12px 28px;
      color:#bfe0dc;
      font-weight:800;
      letter-spacing:.8px;
      margin-bottom:28px;
    }
    .hero-title{
      position:relative;
      z-index:1;
      font-family:'Orbitron',sans-serif;
      font-weight:900;
      line-height:.9;
      font-size:clamp(44px,8vw,92px);
      letter-spacing:5px;
      color:#d8e9e5;
      text-transform:uppercase;
      text-shadow:0 14px 18px rgba(0,0,0,.2);
    }
    .hero-title .thin{
      display:block;
      font-family:'Rajdhani';
      font-size:18px;
      letter-spacing:4px;
      color:#b8d4d0;
      margin:4px 0 12px 9px;
    }
    .hero-actions{
      position:absolute;
      left:28px;
      right:28px;
      bottom:22px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
      z-index:2;
    }
    .ghost-cta,.solid-cta{
      min-height:44px;
      border-radius:8px;
      background:var(--card2);
      color:var(--teal);
      font-family:'Orbitron';
      font-weight:900;
      letter-spacing:1px;
      box-shadow:0 12px 18px rgba(0,0,0,.17);
    }

    .info-card{
      background:var(--card);
      border-radius:30px 30px 18px 30px;
      padding:36px 32px;
      box-shadow:var(--soft-shadow);
      position:relative;
      color:var(--text);
      align-self:start;
      min-height:250px;
      margin-top:74px;
    }
    .info-card h2{
      font-family:'Rajdhani';
      font-size:33px;
      line-height:1;
      color:var(--teal);
      margin-bottom:16px;
      font-weight:900;
    }
    .info-card p{
      font-size:18px;
      line-height:1.14;
      color:var(--text-dim);
      font-weight:600;
      max-width:390px;
    }
    .info-arrow{
      position:absolute;
      right:-4px;
      bottom:-4px;
      width:70px;
      height:70px;
      background:var(--teal);
      border:3px solid var(--card);
      border-radius:14px;
      color:var(--white);
      display:grid;
      place-items:center;
      font-size:34px;
      font-weight:900;
      box-shadow:var(--soft-shadow);
    }
    .get-started{
      position:absolute;
      right:22px;
      top:-46px;
      background:var(--teal);
      color:var(--white);
      border-radius:999px;
      padding:17px 52px;
      font-weight:900;
      font-family:'Orbitron';
      box-shadow:var(--soft-shadow);
    }

    .tab-scroll{
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding:4px 0 10px;
      margin-bottom:8px;
    }
    .tech-btn{
      flex:0 0 auto;
      padding:11px 20px;
      border-radius:999px;
      background:rgba(242,250,248,.72);
      color:var(--teal);
      box-shadow:7px 9px 18px rgba(0,70,70,.14), inset 0 0 0 2px rgba(0,77,75,.17);
      font-family:'Orbitron';
      font-size:11px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
    }
    .tech-btn:hover{
      transform:translateY(-1px);
      background:#fff;
    }
    .tech-btn.active{
      background:var(--teal);
      color:#fff;
      box-shadow:0 12px 24px rgba(0,77,75,.28);
    }

    .panel{
      position:relative;
      background:linear-gradient(145deg,var(--panel),#00605d);
      color:var(--white);
      border-radius:var(--radius);
      padding:24px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel::after{
      content:"";
      position:absolute;
      right:18px;
      top:18px;
      width:130px;
      height:54px;
      border:3px solid rgba(242,250,248,.55);
      border-radius:13px;
      opacity:.45;
      pointer-events:none;
    }
    .panel.panel-neon{background:linear-gradient(145deg,#005a58,#0f8079)}
    .panel.panel-cyan{background:linear-gradient(145deg,#00605d,#0c8d83)}
    .panel.panel-red{background:linear-gradient(145deg,#694747,#9f5656)}
    .panel-light{
      background:var(--card);
      color:var(--text);
      box-shadow:var(--soft-shadow);
    }
    .panel-light::after{
      border-color:rgba(0,77,75,.26);
    }

    .section-title{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }
    .section-title i{
      width:42px;
      height:42px;
      border-radius:13px;
      background:var(--card);
      color:var(--teal);
      display:grid;
      place-items:center;
      font-style:normal;
      font-size:22px;
      font-weight:900;
      box-shadow:0 12px 18px rgba(0,0,0,.15);
    }
    .section-title span{
      font-family:'Orbitron';
      font-size:13px;
      font-weight:900;
      letter-spacing:2px;
      text-transform:uppercase;
      color:inherit;
    }
    .panel-light .section-title i{
      background:var(--teal);
      color:#fff;
    }

    .inp-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      position:relative;
      z-index:1;
    }
    .inp-group{
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }
    .inp-label{
      font-family:'Orbitron';
      font-size:10px;
      letter-spacing:1.8px;
      text-transform:uppercase;
      color:#dff7f2;
      margin-bottom:8px;
      font-weight:900;
    }
    .panel-light .inp-label{color:var(--teal)}
    .input-wrap{position:relative}
    .input-prefix{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:var(--teal);
      font-family:'JetBrains Mono';
      font-size:12px;
      font-weight:900;
      z-index:1;
    }
    input[type=number]{
      width:100%;
      height:48px;
      background:var(--card);
      border:0;
      border-radius:13px;
      padding:0 16px;
      color:var(--teal);
      font-family:'JetBrains Mono';
      font-size:16px;
      font-weight:900;
      box-shadow:inset 0 0 0 2px rgba(0,77,75,.14), 0 10px 18px rgba(0,0,0,.1);
      -moz-appearance:textfield;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{
      -webkit-appearance:none;
    }
    input[type=number]:focus{
      outline:0;
      box-shadow:inset 0 0 0 3px var(--teal),0 0 0 5px rgba(142,230,214,.28);
    }
    .inp-hint{
      font-family:'JetBrains Mono';
      font-size:10px;
      color:#bfd9d5;
      margin-top:6px;
      line-height:1.3;
    }
    .panel-light .inp-hint{color:var(--text-soft)}

    .stat-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      margin-bottom:18px;
    }
    .kv-card{
      background:var(--card);
      color:var(--text);
      border-radius:18px;
      padding:18px 16px;
      box-shadow:var(--soft-shadow);
      min-height:92px;
      position:relative;
      overflow:hidden;
    }
    .kv-card::before{
      content:"";
      position:absolute;
      right:-24px;
      bottom:-24px;
      width:78px;
      height:78px;
      border-radius:50%;
      background:rgba(0,77,75,.08);
    }
    .kv-label{
      font-family:'Orbitron';
      font-size:9px;
      letter-spacing:1.4px;
      text-transform:uppercase;
      color:var(--text-soft);
      font-weight:900;
      margin-bottom:8px;
    }
    .kv-value{
      font-family:'JetBrains Mono';
      font-size:15px;
      font-weight:900;
      color:var(--teal);
      line-height:1.15;
      position:relative;
      z-index:1;
    }

    .row-item{
      background:var(--card);
      color:var(--text);
      border-radius:18px;
      padding:14px 16px;
      margin-bottom:10px;
      box-shadow:0 10px 18px rgba(0,77,75,.13);
      border:2px solid rgba(0,77,75,.08);
    }
    .row-item.active,.row-item:hover{
      border-color:rgba(0,77,75,.45);
      transform:translateY(-1px);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:5px 10px;
      font-family:'Orbitron';
      font-size:9px;
      font-weight:900;
      letter-spacing:1px;
      color:#fff;
      background:var(--teal);
      text-transform:uppercase;
    }
    .badge-neon{background:var(--green)}
    .badge-red{background:var(--red)}
    .badge-cyan{background:var(--cyan);color:#003f3e}

    .progress{
      height:10px;
      background:rgba(0,77,75,.12);
      border-radius:999px;
      overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(0,77,75,.1);
    }
    .progress-fill{
      height:100%;
      background:linear-gradient(90deg,#39bfa9,#8ee6d6,#f2c46e,#e76464);
      border-radius:999px;
    }

    .two-col{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    .three-col{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }
    .mini-table{
      display:grid;
      gap:10px;
      position:relative;
      z-index:1;
    }
    .line-row{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      border-bottom:1px solid rgba(255,255,255,.18);
      padding:9px 0;
    }
    .panel-light .line-row{
      border-bottom:1px solid rgba(0,77,75,.12);
    }
    .line-row strong{
      font-family:'JetBrains Mono';
      font-size:13px;
      color:inherit;
    }
    .line-row small{
      display:block;
      color:#bedbd7;
      font-family:'JetBrains Mono';
      font-size:10px;
      margin-top:3px;
    }
    .panel-light .line-row small{color:var(--text-soft)}
    .year-grid{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }
    .divider-pill{
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,77,75,.3),transparent);
      margin:10px 0 18px;
    }
    .warning{
      color:#fff;
      background:linear-gradient(145deg,#8c5757,#b76464);
    }
    .good{
      color:#fff;
      background:linear-gradient(145deg,#05736e,#1d9489);
    }
    .footer{
      text-align:center;
      padding:22px;
      margin-top:20px;
      background:var(--teal);
      color:#dff7f2;
      border-radius:999px;
      box-shadow:var(--soft-shadow);
      font-family:'Orbitron';
      font-size:11px;
      letter-spacing:3px;
      text-transform:uppercase;
      font-weight:900;
    }

    @media(max-width:900px){
      .topbar{grid-template-columns:1fr}
      .profile-pill{justify-content:center}
      .hero-grid{grid-template-columns:1fr}
      .info-card{margin-top:0}
      .stat-grid{grid-template-columns:1fr 1fr}
      .two-col,.three-col{grid-template-columns:1fr}
    }
    @media(max-width:560px){
      body{padding:18px 10px}
      .nav-pill{padding:0 16px;font-size:14px}
      .hero{min-height:360px;padding:20px}
      .hero-actions{grid-template-columns:1fr;gap:10px}
      .info-card{padding:28px 24px}
      .inp-row,.stat-grid{grid-template-columns:1fr}
      .panel{padding:18px;border-radius:24px}
      .panel::after{display:none}
      .footer{border-radius:26px;line-height:1.5}
      .hero-title{font-size:48px}
    }
  </style>
</head>

      {id:"sant2",name:"SANT.CONSIG.02",owner:"ERWIN",inst:"Santander",rate:1.7165,bal:3136.90,startK:mk(2026,4),sched:S2,color:"#f08b8b"},
      {id:"sant3",name:"SANT.CONSIG.03",owner:"ERWIN",inst:"Santander",rate:1.6876,bal:2786.22,startK:mk(2026,4),sched:S3,color:"#f6aaaa"},
      {id:"jeep",name:"SANT.JEEP",owner:"ERWIN",inst:"Santander",rate:1.77,bal:19913.98,startK:mk(2026,4),sched:JP,color:"#d35e5e"},

      {id:"bb2",name:"BB.CONSIG.EK2",owner:"ERWIN",inst:"BB",rate:2.73,bal:4119.88,startK:mk(2026,4),sched:Array(48).fill(159.26),color:"#e99b44"},
      {id:"bb3",name:"BB.CONSIG.EK3",owner:"ERWIN",inst:"BB",rate:3.27,bal:2060.40,startK:mk(2026,4),sched:Array(48).fill(90.47),color:"#de8840"},

    ];

    const FIXED_EXP_DEF=[
      {id:"aluguel",name:"ALUGUEL + COND.",val:2160,growthRate:5,isLoan:false},
      {id:"luz",name:"LUZ",val:320,growthRate:4,isLoan:false},

      {id:"colegio",name:"COLÉGIO OBJETIVO",val:1934.50,growthRate:10,isLoan:false},

      {id:"outros",name:"OUTROS",val:0,growthRate:3,isLoan:false}
    ];

    function calcExpense(exp,mo){
      return exp.val*Math.pow(1+exp.growthRate/100,mo/12);
    }

    function calcTotalFixedAtMonth(exps,mo){
      return exps.reduce((s,e)=>s+calcExpense(e,mo),0);
    }

    function calcFixedNoLoanAtMonth(exps,mo){
      return exps.filter(e=>!e.isLoan).reduce((s,e)=>s+calcExpense(e,mo),0);
    }

    function calcINSS(g){
      let t=0,p=0;
      for(const[l,r]of[[1412,.075],[2666.68,.09],[4000.03,.12],[7786.02,.14]]){
        if(g<=p)break;
        t+=(Math.min(g,l)-p)*r;
        p=l;
      }
      return t;
    }

    function calcIRRF(g,i){
      const b=g-i;
      for(const[l,r,d]of[[2259.20,0,0],[2826.65,.075,169.44],[3751.05,.15,381.44],[4664.68,.225,662.77],[1e9,.275,896]]){
        if(b<=l)return Math.max(0,b*r-d);
      }
      return 0;
    }

    function netS(g){
      const i=calcINSS(g);
      return g-i-calcIRRF(g,i);
    }

    function netPPR(g){
      for(const[l,r,d]of[[7640.80,0,0],[9922.28,.075,573.06],[13167,.15,1316.28],[16380.38,.225,2303.55],[1e9,.275,3122.06]]){
        if(g<=l)return g-Math.max(0,g*r-d);
      }
      return g;
    }

    function gSal(base,target,i,months){
      return base+(target-base)*Math.min(i,months)/months;
    }

    function runSim(params){
      const {
        raquelIncome,
        erwinIncome,
        foodIncome,
        otherIncome,
        pprNet,
        raquelTarget,
        erwinTarget,
        foodTarget,
        growthMonths,
        fiiRate,
        livingMin,
        fixedExps,
        initialPool
      }=params;

      const START=mk(2026,4);
      const END_K=mk(2060,11);

      let pool=initialPool;
      let portfolio=0;
      let debtFreeK=null;

      let loans=LOANS_DEF.map(l=>({
        ...l,
        balance:l.bal,
        paidOff:false,
        paidOffMonth:null,
        totalPaid:0,
        totalInterest:0
      }));

      const months=[];

      for(let i=0;;i++){
        const k=START+i;
        if(k>END_K)break;

        const [y,m]=fk(k);

        const rI=gSal(raquelIncome,raquelTarget,i,growthMonths);
        const eI=gSal(erwinIncome,erwinTarget,i,growthMonths);
        const fI=gSal(foodIncome,foodTarget,i,growthMonths);

        const income=rI+eI+fI+otherIncome;
        const fixedNoLoan=calcFixedNoLoanAtMonth(fixedExps,i);
        const totalDebtBefore=loans.reduce((s,l)=>s+l.balance,0);
        const isDebtFree=totalDebtBefore<=0.5;

        if(!isDebtFree){
          const surp=Math.max(0,income-fixedNoLoan-livingMin);
          const liv=Math.min(Math.max(0,income-fixedNoLoan),livingMin);

          pool+=surp;

          let lumpSum=0;
          let lumpLbl="";

          if(m===11){
            const b=rI+eI;
            lumpSum+=b;
            lumpLbl=`13° (${brl(b)})`;
          }

          if(m===3&&y>=2027){
            const p=pprNet*Math.max(.4,rI/Math.max(raquelIncome,1));
            lumpSum+=p;
            lumpLbl+=(lumpLbl?" + ":"")+`PPR (${brl(p)})`;
          }

          pool+=lumpSum;

          let totalPmt=0;
          const loanDet=[];

          for(const loan of loans){
            if(loan.paidOff||loan.balance<=0.5){
              if(!loan.paidOff&&loan.balance<=0.5){
                loan.paidOff=true;
                loan.paidOffMonth=loan.paidOffMonth||k;
                loan.balance=0;
              }

              loanDet.push({
                id:loan.id,
                name:loan.name,
                pmt:0,
                bal:0,
                color:loan.color
              });
              continue;
            }

            const si=k-loan.startK;

            if(si<0){
              loanDet.push({
                id:loan.id,
                name:loan.name,
                pmt:0,
                bal:loan.balance,
                color:loan.color
              });
              continue;
            }

            const interest=loan.balance*loan.rate/100;
            let sp=si<loan.sched.length?loan.sched[si]:0;

            if(sp<=0&&loan.balance>0.5){
              sp=Math.min(loan.balance+interest,loan.sched[0]||500);
            }

            sp=Math.min(sp,loan.balance+interest);

            const princ=Math.max(0,sp-interest);

            loan.balance=Math.max(0,loan.balance-princ);
            loan.totalPaid+=sp;
            loan.totalInterest+=interest;
            totalPmt+=sp;

            if(loan.balance<=0.5){
              loan.paidOff=true;
              loan.paidOffMonth=k;
              loan.balance=0;
            }

            loanDet.push({
              id:loan.id,
              name:loan.name,
              pmt:sp,
              bal:loan.balance,
              color:loan.color
            });
          }

          pool-=totalPmt;

          let lumpAmort=0;
          const amortDet=[];

          if(lumpSum>0){
            const mN=m===11?4:8;
            const est=totalPmt>0?totalPmt:3500;
            const exc=Math.max(0,pool-est*mN);
            let rem=exc;

            for(const loan of loans.filter(l=>!l.paidOff&&l.balance>0.5).sort((a,b)=>b.rate-a.rate)){
              if(rem<=0)break;

              const ap=Math.min(rem,loan.balance);

              if(ap>0){
                loan.balance-=ap;
                rem-=ap;
                lumpAmort+=ap;
                pool-=ap;

                amortDet.push({
                  id:loan.id,
                  name:loan.name,
                  amount:ap,
                  color:loan.color
                });

                if(loan.balance<=0.5){
                  loan.paidOff=true;
                  loan.paidOffMonth=k;
                  loan.balance=0;
                }
              }
            }
          }

          const totalDebt=loans.reduce((s,l)=>s+l.balance,0);

          if(totalDebt<=0.5&&!debtFreeK){
            debtFreeK=k;
            portfolio=Math.max(0,pool);
            pool=0;
          }

          months.push({
            k,y,m,
            label:fm(y,m),
            phase:"debt",
            income,
            rI,eI,fI,
            fixedNoLoan,
            totalPmt,
            pool,
            liv,
            surp,
            lumpSum,
            lumpLbl,
            lumpAmort,
            loanDet,
            amortDet,
            totalDebt,
            active:loans.filter(l=>!l.paidOff).length,
            portfolio:0,
            yield_:0,
            contribution:0,
            halfLiving:0,
            halfInvest:0,
            spendPower:liv,
            critical:pool<0
          });
        }else{
          if(!debtFreeK){
            debtFreeK=k;
            portfolio=Math.max(0,pool);
            pool=0;
          }

          const surplus=income-fixedNoLoan;
          const hL=Math.max(livingMin,Math.floor(surplus/2));
          const hI=Math.max(0,surplus-hL);

          let lI=0;
          let lLbl="";

          if(m===11){
            const b=rI+eI;
            lI+=b;
            lLbl=`13° (${brl(b)})`;
          }

          if(m===3&&y>=2027){
            const p=pprNet*Math.max(.4,rI/Math.max(raquelIncome,1));
            lI+=p;
            lLbl+=(lLbl?" + ":"")+`PPR (${brl(p)})`;
          }

          const yld=portfolio*fiiRate;
          portfolio+=yld+hI+lI;

          months.push({
            k,y,m,
            label:fm(y,m),
            phase:"invest",
            income,
            rI,eI,fI,
            fixedNoLoan,
            totalPmt:0,
            pool:0,
            liv:hL,
            surp:hI,
            lumpSum:lI,
            lumpLbl:lLbl,
            lumpAmort:0,
            loanDet:[],
            amortDet:[],
            totalDebt:0,
            active:0,
            portfolio,
            yield_:yld,
            contribution:hI+lI,
            halfLiving:hL,
            halfInvest:hI,
            spendPower:surplus+yld,
            critical:false
          });
        }
      }

      const milestones=loans.map(l=>({
        ...l,
        paidOffLabel:l.paidOffMonth?fm(...fk(l.paidOffMonth)):"—"
      })).sort((a,b)=>(a.paidOffMonth||9e9)-(b.paidOffMonth||9e9));

      return {months,milestones,debtFreeK};
    }

    function Inp({label,value,onChange,hint,prefix,step,small}){
      const [local,setLocal]=useState(String(value));
      const timer=useRef(null);

      useEffect(()=>{
        setLocal(String(value));
      },[value]);

      const handle=e=>{
        const v=e.target.value;
        setLocal(v);
        clearTimeout(timer.current);
        timer.current=setTimeout(()=>{
          const n=parseFloat(v);
          if(!isNaN(n))onChange(n);
        },450);
      };

      return (
        <div className="inp-group" style={small?{marginBottom:0}:null}>
          {label&&<div className="inp-label">{label}</div>}
          <div className="input-wrap">
            {prefix&&<span className="input-prefix">{prefix}</span>}
            <input
              type="number"
              value={local}
              onChange={handle}
              step={step||"any"}
              style={{
                paddingLeft:prefix?44:16,
                height:small?40:48,
                fontSize:small?13:16
              }}
            />
          </div>
          {hint&&<div className="inp-hint">{hint}</div>}
        </div>
      );
    }

                        <div className="progress-fill" style={{width:Math.min(100,tot/max*100)+"%"}} />
                      </div>
                      <strong>{brl(tot)}</strong>
                    </div>
                  );
                })}
              </section>
            </>
          )}

          {tab==="resumo"&&(
            <>
              <section className={"panel "+(breakMonth?"warning":"good")}>
                <SectionTitle icon="!">Fase 01 // quitação das dívidas</SectionTitle>

                <div className="two-col">
                  <div>
                    <div className="disp" style={{fontSize:12,opacity:.75}}>DÍVIDA.TOTAL</div>
                    <div className="mono" style={{fontSize:28,fontWeight:900}}>{brl(origDebt)}</div>
                  </div>

                  <div style={{textAlign:"right"}}>
                    <div className="disp" style={{fontSize:12,opacity:.75}}>STATUS</div>
                    <div className="mono" style={{fontSize:24,fontWeight:900}}>
                      {breakMonth?`ROMPE EM ${breakMonth.label}`:debtFreeLabel}
                    </div>
                    <small className="mono">{debtMonths.length} meses em fase dívida</small>
                  </div>
                </div>
              </section>

              <div className="stat-grid">
                <KV label="Pool inicial" value={brl(initialPool)} />
                <KV label="Juros totais" value={brl(totalIntPaid)} color="var(--amber)" />
                <KV label="Parcela mai/26" value={brl(M1.totalPmt)} color="var(--red)" />
                <KV label="P/viver" value={brl(livingMin)} />
              </div>

              <section className="panel panel-light">
                <SectionTitle icon="✓">Empréstimos // ordem de quitação</SectionTitle>

                {sim.milestones.map((l,i)=>(
                  <div key={l.id} className="row-item">
                    <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center"}}>
                      <div>
                        <span className="badge">#{i+1}</span>{" "}
                        <strong className="disp" style={{fontSize:12,color:l.color}}>
                          {l.name}
                        </strong>
                        <div className="mono muted" style={{fontSize:10,marginTop:4}}>
                          {l.owner} · {l.rate}%/m · saldo inicial {brl(l.bal)}
                        </div>
                      </div>

                      <div style={{textAlign:"right"}}>
                        <strong className="mono" style={{color:"var(--teal)"}}>
                          {l.paidOffLabel}
                        </strong>
                        <div className="mono" style={{fontSize:10,color:"var(--amber)"}}>
                          J: {brl(l.totalInterest)}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </section>
            </>
          )}

          {tab==="orcamento"&&(
            <div className="two-col">
              <section className="panel">
                <SectionTitle icon="↑">Entradas // maio 2026</SectionTitle>

                {[
                  ["RAQUEL",raquelIncome,"valor líquido"],
                  ["ERWIN",erwinIncome,"valor líquido"],
                  ["ALIMENTAÇÃO",foodIncome,"benefício"],
                  ["OUTRAS",otherIncome,"recorrente"]
                ].map(([n,v,s])=>(
                  <div key={n} className="line-row">
                    <div>
                      <strong className="disp">{n}</strong>
                      <small>{s}</small>
                    </div>
                    <strong>{brl(v)}</strong>
                  </div>
                ))}

                <div className="line-row" style={{borderBottom:0,paddingTop:16}}>
                  <strong className="disp">TOTAL</strong>
                  <strong style={{fontSize:18}}>{brl(incomeNow)}</strong>
                </div>
              </section>

              <section className="panel panel-light">
                <SectionTitle icon="↓">Saídas // maio 2026</SectionTitle>

                {fixedExps.map(e=>(
                  <div key={e.id} className="line-row">
                    <div>
                      <strong className="disp" style={{fontSize:11,color:e.isLoan?"var(--cyan)":"var(--teal)"}}>
                        {e.name}
                      </strong>
                      <small>{e.growthRate>0?`+${e.growthRate}%/a`:"flat"}</small>
                    </div>
                    <strong>{brl(e.val)}</strong>
                  </div>
                ))}

                <div className="line-row" style={{borderBottom:0,paddingTop:16}}>
                  <strong className="disp">TOTAL</strong>
                  <strong style={{fontSize:18}}>{brl(totalFixedNow)}</strong>
                </div>
              </section>

              <section className="panel panel-cyan" style={{gridColumn:"1/-1"}}>
                <SectionTitle icon="=">Fluxo mensal real</SectionTitle>

                <div className="three-col">
                  <KV label="Renda" value={brl(incomeNow)} />
                  <KV label="Fixos sem dívidas" value={brl(fixedNow)} />
                  <KV
                    label="Sobra antes das dívidas"
                    value={brl(incomeNow-fixedNow)}
                    color={(incomeNow-fixedNow)<0?"var(--red)":"var(--teal)"}
                  />
                </div>
              </section>
            </div>
          )}

          {tab==="projecao"&&(
            <>
              <section className="panel panel-light">
                <SectionTitle icon="▦">Escolha o ano</SectionTitle>
                <div className="year-grid">
                  {yrs.map(y=>(
                    <button
                      key={y}
                      onClick={()=>setYr(y)}
                      className={"tech-btn "+(yr===y?"active":"")}
                    >
                      {y}
                    </button>
                  ))}
                </div>
              </section>

              {sim.months.filter(r=>r.y===yr).map(row=>{
                const isE=exp===row.k;
                const isInv=row.phase==="invest";
                const dp=origDebt>0?Math.max(0,row.totalDebt/origDebt*100):0;

                return (
                  <div
                    key={row.k}
                    onClick={()=>setExp(isE?null:row.k)}
                    className="row-item"
                    style={{
                      cursor:"pointer",
                      borderColor:row.critical?"var(--red)":isInv?"var(--green)":"rgba(0,77,75,.12)"
                    }}
                  >
                    <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center"}}>
                      <div>
                        <strong className="disp" style={{fontSize:14}}>{row.label}</strong>{" "}
                        <span className={"badge "+(isInv?"badge-neon":row.critical?"badge-red":"")}>
                          {isInv?"INVEST":"DÍVIDA"}
                        </span>

                        {row.lumpLbl&&(
                          <div className="mono" style={{fontSize:10,color:"var(--cyan)",marginTop:4}}>
                            ★ {row.lumpLbl}
                          </div>
                        )}
                      </div>

                      <div style={{textAlign:"right"}}>
                        {isInv?(
                          <>
                            <strong className="mono" style={{fontSize:15,color:"var(--teal)"}}>
                              {brl(row.portfolio)}
                            </strong>
                            <div className="mono muted" style={{fontSize:10}}>
                              r: {brl(row.yield_)}
                            </div>
                          </>
                        ):(
                          <>
                            <strong className="mono" style={{fontSize:15,color:row.critical?"var(--red)":"var(--teal)"}}>
                              {brl(row.totalDebt)}
                            </strong>
                            <div className="mono muted" style={{fontSize:10}}>
                              pool: {brl(row.pool)}
                            </div>
                          </>
                        )}
                      </div>
                    </div>

                    {!isInv&&(
                      <div className="progress" style={{margin:"12px 0 8px"}}>
                        <div className="progress-fill" style={{width:dp+"%"}} />
                      </div>
                    )}

                    <div className="mono" style={{
                      display:"flex",
                      justifyContent:"space-between",
                      gap:10,
                      flexWrap:"wrap",
                      fontSize:11,
                      color:"var(--text-dim)"
                    }}>
                      {isInv?(
                        <>
                          <span>viver: {brl(row.halfLiving)}</span>
                          <span>fii: {brl(row.halfInvest)}</span>
                          <span>poder: {brl(row.spendPower)}</span>
                        </>
                      ):(
                        <>
                          <span>parc: {brl(row.totalPmt)}</span>
                          <span>+pool: {brl(row.surp)}</span>
                          <span>viver: {brl(row.liv)}</span>
                          {row.lumpAmort>0&&<span>amort: {brl(row.lumpAmort)}</span>}
                        </>
                      )}
                    </div>

                    {isE&&<div className="divider-pill" />}

                    {isE&&(
                      <div className="three-col">
                        <KV label="Renda" value={brl(row.income)} />
                        <KV label="Gastos" value={brl(row.fixedNoLoan)} />
                        {isInv?(
                          <KV label="Rendimento FII" value={brl(row.yield_)} />
                        ):(
                          <KV label="Pool final" value={brl(row.pool)} color={row.pool<0?"var(--red)":"var(--teal)"} />
                        )}
                      </div>
                    )}

                    {isE&&row.amortDet.length>0&&(
                      <div style={{marginTop:12}}>
                        {row.amortDet.map(a=>(
                          <div key={a.id} className="mono" style={{fontSize:11,color:a.color}}>
                            → {a.name}: {brl(a.amount)}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </>
          )}

          {tab==="marcos"&&(
            <>
              <section className="panel panel-light">
                <SectionTitle icon="⌁">Timeline de quitação</SectionTitle>

                {sim.milestones.map((l,i)=>(
                  <div key={l.id} className="row-item">
                    <div style={{display:"flex",gap:14,alignItems:"center"}}>
                      <span className="badge">{i+1}</span>

                      <div style={{flex:1}}>
                        <strong className="disp" style={{fontSize:12,color:l.color}}>
                          {l.name}
                        </strong>
                        <div className="mono muted" style={{fontSize:10}}>
                          {l.owner} · {l.rate}%/m · {brl(l.bal)}
                        </div>
                      </div>

                      <strong className="mono">{l.paidOffLabel}</strong>
                    </div>
                  </div>
                ))}
              </section>

              <section className="panel">
                <SectionTitle icon="★">Eventos relevantes</SectionTitle>

                {sim.months.filter(m=>m.phase==="debt"&&m.amortDet.length>0).slice(0,18).map(m=>(
                  <div key={m.k} className="line-row">
                    <strong className="disp">{m.label}</strong>
                    <span className="mono">amortizou {brl(m.lumpAmort)}</span>
                  </div>
                ))}

                {investMonths[0]&&(
                  <div className="line-row">
                    <strong className="disp">{investMonths[0].label}</strong>
                    <span className="badge badge-neon">início patrimônio</span>
                  </div>
                )}
              </section>
            </>
          )}

          {tab==="patrimonio"&&(
            <>
              <div className="stat-grid">
                <KV label="Patrimônio 2034" value={inv2034?brl(inv2034.portfolio):"—"} />
                <KV label="Rendimento 2034/m" value={inv2034?brl(inv2034.yield_):"—"} />
                <KV label="Patrimônio 2060" value={inv2060?brl(inv2060.portfolio):"—"} />
                <KV label="Rendimento 2060/m" value={inv2060?brl(inv2060.yield_):"—"} />
              </div>

              <section className="panel panel-light">
                <SectionTitle icon="∞">Poder de compra anual</SectionTitle>

                {investMonths.filter((_,i)=>i%12===11||i===investMonths.length-1).map((m,i)=>(
                  <div key={i} className="line-row">
                    <strong className="disp">{m.y}</strong>
                    <span className="mono">{brl(m.portfolio)}</span>
                    <span className="mono">r: {brl(m.yield_)}</span>
                    <span className="mono">poder: {brl(m.spendPower)}</span>
                  </div>
                ))}

                {investMonths.length===0&&(
                  <p className="mono muted">
                    A fase de investimento ainda não começa com os parâmetros atuais.
                  </p>
                )}
              </section>
            </>
          )}

          {tab==="analise"&&(
            <>
              <section className="panel panel-light">
                <SectionTitle icon="?">Parecer final</SectionTitle>

                <p style={{fontSize:18,lineHeight:1.35,fontWeight:600}}>
                  Com a renda atual de <strong>{brl(incomeNow)}</strong>, os gastos fixos sem dívidas ficam em{" "}
                  <strong>{brl(fixedNow)}</strong>. A sobra antes das dívidas é{" "}
                  <strong>{brl(incomeNow-fixedNow)}</strong>; depois de reservar {brl(livingMin)} para viver,
                  a sobra para a pool é <strong>{brl(surplusNow)}</strong>.
                </p>

                <div className="divider-pill" />

                <p style={{fontSize:18,lineHeight:1.35,fontWeight:600}}>
                  Em maio/2026, a pool sai de <strong>{brl(initialPool)}</strong> para{" "}
                  <strong style={{color:M1.pool<0?"var(--red)":"var(--teal)"}}>
                    {brl(M1.pool)}
                  </strong>.{" "}
                  {breakMonth?(
                    <>
                      O plano rompe em <strong style={{color:"var(--red)"}}>{breakMonth.label}</strong>{" "}
                      se nenhuma entrada extra ou corte for feito.
                    </>
                  ):(
                    <>
                      Com os parâmetros atuais, a dívida fica livre em <strong>{debtFreeLabel}</strong>.
                    </>
                  )}
                </p>
              </section>

              <section className="panel">
                <SectionTitle icon="⚑">Ranking de custo</SectionTitle>

                {LOANS_DEF.filter(l=>l.rate>0.5).sort((a,b)=>b.rate-a.rate).map((l,i)=>{
                  const ms=sim.milestones.find(m=>m.id===l.id);

                  return (
                    <div key={l.id} className="row-item">
                      <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center"}}>
                        <div>
                          <strong className="disp" style={{fontSize:12,color:l.color}}>
                            #{i+1} {l.name}
                          </strong>
                          <div className="mono muted" style={{fontSize:10,marginTop:4}}>
                            taxa: {l.rate}%/m · saldo inicial: {brl(l.bal)}
                          </div>
                        </div>

                        <div style={{textAlign:"right"}}>
                          <strong className="mono" style={{color:"var(--red)"}}>
                            {brl(ms?.totalInterest||0)}
                          </strong>
                          <div className="mono muted" style={{fontSize:10}}>
                            quit: {ms?.paidOffLabel || "—"}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </section>
            </>
          )}

          <footer className="footer">
            special collaboration · klein finance · maio 2026 → dezembro 2060
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
